<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hipoteca Financial Auditor</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <header>

        <h1>🏦 HIPOTECA FINANCIAL AUDITOR</h1>

        <p>
            Sistema Profesional de Auditoría Financiera
            de Créditos Hipotecarios
        </p>

    </header>
    <nav class="menu">

    <button>🏠 Dashboard</button>

    <button>📊 Cronograma</button>

    <button>📈 Ingeniería</button>

    <button>🧾 Auditoría</button>

    <button>📑 Reportes</button>

    <button>⚙ Configuración</button>

</nav>

    <section class="datos">

        <div class="card">

            <h2>Datos del Crédito</h2>

            <label>Capital (S/)</label>
            <input type="number" id="capital" value="1343777.98">

            <label>TEA (%)</label>
            <input type="number" id="tea" value="14.15">

            <label>Plazo (meses)</label>
            <input type="number" id="plazo" value="180">

            <button onclick="calcular()">
                Calcular
            </button>

        </div>

    </section>

    <section class="resultados">

        <div class="resultado">
            <h3>Cuota Mensual</h3>
            <p id="cuota">-</p>
        </div>

        <div class="resultado">
            <h3>TEM</h3>
            <p id="tem">-</p>
        </div>

        <div class="resultado">
            <h3>VPN</h3>
            <p id="vpn">-</p>
        </div>

        <div class="resultado">
            <h3>Duración</h3>
            <p id="duracion">-</p>
        </div>

    </section>

    <section class="dictamen">

        <h2>Opinión Técnica</h2>

        <div id="opinion">

            Esperando cálculo...

        </div>

    </section>

</div>

<script src="script.js"></script>

</body>

</html>
